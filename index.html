<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Design Brief Generator - Premium UI/UX project prompts.">
    <title>BriefGen - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;700&family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&family=Montserrat:wght@400;700&family=DM+Serif+Display:wght@400&family=Space+Grotesk:wght@500;700&family=Sora:wght@400;700&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Serif:wght@400;600&family=Public+Sans:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="top-nav">
            <h1>Brief<span class="highlight">Gen</span></h1>
            <p>Realistic UI/UX briefs instantly.</p>
        </header>

        <main class="grid-container">
            <section class="main-brief card">
                <div class="badge">Problem Statement</div>
                <div id="brief-display" class="brief-content">
                    <p class="placeholder-text">Click the button below to start.</p>
                </div>
                <div class="actions">
                    <button id="generate-btn" class="primary-btn">Generate New Brief</button>
                    <button id="copy-btn" class="secondary-btn" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </section>

            <aside id="additional-data" class="supplemental-view hidden">
                <section class="brand-section">
                    <div class="asset-group card">
                        <h3>Typography Guide</h3>
                        <div id="font-container" class="font-display"></div>
                    </div>
                    <div class="asset-group card">
                        <h3>Brand Palette</h3>
                        <div id="color-container" class="color-display"></div>
                    </div>
                </section>
                <section class="personas-section">
                    <h3>User Personas</h3>
                    <div id="persona-container" class="persona-stack"></div>
                </section>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
